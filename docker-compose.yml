version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════
# AegisAI — Docker Compose
#
# Services:
#   backend   FastAPI (port 8000)
#   frontend  Next.js  (port 3000)
#
# Usage:
#   docker compose up --build          # first run
#   docker compose up -d               # detached
#   docker compose logs -f backend     # stream backend logs
#   docker compose down -v             # stop + remove volumes
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── Backend (FastAPI) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: aegisai-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
      - RELOAD=false
      # Allow requests from frontend container AND host browser
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000,http://127.0.0.1:3000
      # Default storage:
      #   • DATABASE_URL points at the local `db` service (Postgres).
      #   • DB_PATH is a SQLite fallback (used only if DATABASE_URL is unset).
      # Override either by editing ./backend/.env.
      - DATABASE_URL=postgresql+psycopg://aegisai:aegisai@db:5432/aegisai
      - DB_PATH=/app/data/attack_memory.db
    volumes:
      # Persist SQLite fallback across container restarts
      - aegisai-data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - aegisai-net

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: aegisai-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=aegisai
      - POSTGRES_PASSWORD=aegisai
      - POSTGRES_DB=aegisai
    volumes:
      - aegisai-pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegisai -d aegisai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aegisai-net

  # ── Frontend (Next.js) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
      args:
        # Next.js needs the API URL at build time for SSR
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: aegisai-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aegisai-net


# ── Networks ─────────────────────────────────────────────────────────────
networks:
  aegisai-net:
    driver: bridge


# ── Volumes ──────────────────────────────────────────────────────────────
volumes:
  aegisai-data:
    driver: local
  aegisai-pg:
    driver: local